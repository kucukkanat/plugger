name: Release

# Publishes the @plugger/* packages to npmjs.org.
# Trigger by pushing a version tag (e.g. `git tag v0.1.0 && git push --tags`),
# or run manually from the Actions tab.
#
# Requires a repository secret named NPM_TOKEN — an npm automation token with
# publish rights to the @plugger scope (npmjs.com → Access Tokens → Generate →
# "Automation"). Add it with:  gh secret set NPM_TOKEN

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      # Rewrite internal `workspace:*` deps to the concrete release versions
      # before packing. bun's pack reads workspace versions from the lockfile,
      # which can lag a version bump — pinning here makes the published deps
      # correct regardless of lockfile state.
      - name: Pin internal @plugger/* deps to release versions
        run: |
          node -e '
            const fs = require("fs"), path = require("path");
            const dirs = fs
              .readdirSync("packages")
              .map((d) => path.join("packages", d))
              .filter((d) => fs.existsSync(path.join(d, "package.json")));
            const version = {};
            for (const d of dirs) {
              const j = JSON.parse(fs.readFileSync(path.join(d, "package.json")));
              version[j.name] = j.version;
            }
            for (const d of dirs) {
              const f = path.join(d, "package.json");
              const j = JSON.parse(fs.readFileSync(f));
              let changed = false;
              const deps = j.dependencies || {};
              for (const name of Object.keys(deps)) {
                if (deps[name] === "workspace:*" && version[name]) {
                  deps[name] = version[name];
                  changed = true;
                }
              }
              if (changed) {
                fs.writeFileSync(f, JSON.stringify(j, null, 2) + "\n");
                console.log("pinned", j.name, "->", JSON.stringify(deps));
              }
            }
          '

      - name: Publish @plugger/* to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not set. Add it via Settings → Secrets and variables → Actions, or: gh secret set NPM_TOKEN"
            exit 1
          fi
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc

          out="$(mktemp -d)"
          # Publish in dependency order (core → vanilla → adapters). `bun pm pack`
          # rewrites the internal workspace:* deps to the real version, and
          # `npm publish` handles registry auth from ~/.npmrc. Versions already on
          # npm are skipped, so re-runs are safe.
          for p in core vanilla preact react vue web-components; do
            dir="packages/$p"
            name=$(node -p "require('./$dir/package.json').name")
            version=$(node -p "require('./$dir/package.json').version")
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "✓ $name@$version already on npm — skipping"
              continue
            fi
            echo "→ packing + publishing $name@$version"
            (cd "$dir" && bun pm pack --destination "$out")
            base=$(echo "$name" | sed 's|^@||; s|/|-|g')
            npm publish "$out/${base}-${version}.tgz" --access public
          done
